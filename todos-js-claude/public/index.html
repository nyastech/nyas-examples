<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .app {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 520px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: .85rem; opacity: .8; margin-top: 4px; }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-row input {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4338ca; }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-row button {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: .82rem;
      cursor: pointer;
      color: #666;
      transition: all .15s;
    }

    .filter-row button.active {
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
    }

    .filter-row .clear-btn {
      margin-left: auto;
      color: #e44;
      border-color: #e44;
    }

    .filter-row .clear-btn:hover { background: #e44; color: #fff; }

    ul { list-style: none; padding: 0; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f5f5f5;
      transition: background .1s;
    }

    .todo-item:hover { background: #fafafa; }

    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .title {
      flex: 1;
      font-size: .95rem;
      color: #222;
      word-break: break-word;
    }

    .todo-item.done .title {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .15s;
    }

    .todo-item .del-btn:hover { color: #e44; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: .9rem;
    }

    .footer-info {
      padding: 12px 20px;
      font-size: .8rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Todos</h1>
      <p>Powered by Nyas.io (PostgreSQL)</p>
    </header>

    <div class="input-row">
      <input id="new-todo" type="text" placeholder="What needs to be done?" />
      <button id="add-btn">Add</button>
    </div>

    <div class="filter-row">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
      <button class="clear-btn" id="clear-done">Clear done</button>
    </div>

    <ul id="todo-list"></ul>
    <div class="footer-info" id="count"></div>
  </div>

  <script>
    let todos = [];
    let filter = 'all';

    const list = document.getElementById('todo-list');
    const input = document.getElementById('new-todo');
    const countEl = document.getElementById('count');

    async function api(method, path, body) {
      const res = await fetch('/api' + path, {
        method,
        headers: body ? { 'Content-Type': 'application/json' } : {},
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 204) return null;
      if (!res.ok) throw new Error((await res.json()).error);
      return res.json();
    }

    async function load() {
      todos = await api('GET', '/todos');
      render();
    }

    async function addTodo() {
      const title = input.value.trim();
      if (!title) return;
      const todo = await api('POST', '/todos', { title });
      todos.unshift(todo);
      input.value = '';
      render();
    }

    async function toggle(id, completed) {
      const updated = await api('PATCH', `/todos/${id}`, { completed });
      todos = todos.map(t => t.id === id ? updated : t);
      render();
    }

    async function remove(id) {
      await api('DELETE', `/todos/${id}`);
      todos = todos.filter(t => t.id !== id);
      render();
    }

    async function clearDone() {
      await api('DELETE', '/todos');
      todos = todos.filter(t => !t.completed);
      render();
    }

    function render() {
      const visible = todos.filter(t => {
        if (filter === 'active') return !t.completed;
        if (filter === 'done') return t.completed;
        return true;
      });

      list.innerHTML = visible.length === 0
        ? `<li class="empty">No todos here</li>`
        : visible.map(t => `
          <li class="todo-item ${t.completed ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggle(${t.id}, this.checked)" />
            <span class="title">${escHtml(t.title)}</span>
            <button class="del-btn" onclick="remove(${t.id})" title="Delete">&#x2715;</button>
          </li>`).join('');

      const remaining = todos.filter(t => !t.completed).length;
      countEl.textContent = `${remaining} item${remaining !== 1 ? 's' : ''} left`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Events
    document.getElementById('add-btn').addEventListener('click', addTodo);
    input.addEventListener('keydown', e => e.key === 'Enter' && addTodo());
    document.getElementById('clear-done').addEventListener('click', clearDone);

    document.querySelector('.filter-row').addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      filter = btn.dataset.filter;
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

    load();
  </script>
</body>
</html>
